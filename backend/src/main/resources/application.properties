# ============================================================
# Nexo Criminal - Configuracion de la aplicacion
# ============================================================

spring.application.name=nexo-criminal-backend
server.port=8080

# ---- Base de datos PostgreSQL ----
spring.datasource.url=jdbc:postgresql://localhost:5432/nexo_criminal
spring.datasource.username=postgres
spring.datasource.password=16037270Em
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ---- JWT ----
nexo.jwt.secret=ClaveSecretaSuperSeguraParaNexoCriminalTheRedThread2026!
nexo.jwt.expiracion-horas=8

# ---- CORS ----
nexo.cors.origenes=http://localhost:5173,http://localhost:3000

# ---- Logs ----
logging.level.com.nexocriminal=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ---- Motor Red Thread ----
# Radio en metros para detectar nodo logistico
nexo.engine.nodo-logistico.radio-metros=500
nexo.engine.nodo-logistico.ventana-horas=2
nexo.engine.nodo-logistico.min-vehiculos=3

# Radio en metros para detectar escolta
nexo.engine.escolta.radio-metros=100
nexo.engine.escolta.ventana-minutos=2
nexo.engine.escolta.min-coincidencias=3

# Grados de separacion maximos en circulo de confianza
nexo.engine.circulo.max-grados=2

# Umbral de similitud para agrupar modus operandi
nexo.engine.modus.umbral=0.75

spring.jpa.open-in-view=true

spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-self-references=false

# Personas Desaparecidas - Motor
nexo.engine.desaparicion.radio-cluster-metros=1500
nexo.engine.desaparicion.min-cluster=3
nexo.engine.desaparicion.ventana-dias=30
nexo.engine.desaparicion.radio-nodo-sospechoso=1000

# Uploads
nexo.uploads.directorio=uploads

# Multipart - tamaño max
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Anthropic Claude IA
nexo.ia.api-key=${ANTHROPIC_API_KEY:}
nexo.ia.modelo=claude-sonnet-4-5
nexo.ia.max-tokens=2048
nexo.ia.url=https://api.anthropic.com/v1/messages